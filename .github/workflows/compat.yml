name: Compatibility

on:
  workflow_run:
    workflows: [CLI]
    types: [completed]

permissions:
  contents: read

jobs:
  compat:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 23, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: packages/autoskills

      - name: Run tests
        run: npm test
        working-directory: packages/autoskills

      - name: Smoke test — detect and dry-run install
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/test-project"
          echo '{ "dependencies": { "next": "15.0.0", "react": "19.0.0" } }' > "$RUNNER_TEMP/test-project/package.json"
          cd "$RUNNER_TEMP/test-project"
          node "$GITHUB_WORKSPACE/packages/autoskills/index.mjs" --dry-run -y
