name: CLI

on:
  push:
    branches: [main]
    paths:
      - "packages/autoskills/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/autoskills/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check linting
        run: npm run lint

      - name: Check formatting
        run: npm run fmt:check

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: packages/autoskills

      - name: Run tests
        run: npm test
        working-directory: packages/autoskills
